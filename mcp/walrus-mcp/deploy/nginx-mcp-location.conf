# Drop-in for /etc/nginx/conf.d/sui.furqaannabi.com.conf — add inside
# the existing `server { listen 443 ssl; … }` block alongside the
# `location /` that proxies to the enclave.
#
# Streamable-HTTP MCP needs:
#   - chunked / unbuffered responses (proxy_buffering off, no buffering for SSE)
#   - HTTP/1.1 keepalive
#   - long read timeouts (some tools hit upstream HTTP that can take seconds)

location /mcp {
    proxy_pass http://127.0.0.1:3030;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    chunked_transfer_encoding on;
}
