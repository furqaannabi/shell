# External endpoints the Shell matching enclave is allowed to call.
# Updated to whichever network the enclave is built for.
endpoints:
  # Sui RPC — fetch OrderCommitment shared objects and broadcast txs.
  - fullnode.testnet.sui.io
  # Seal aggregator — request decryption-key shares.
  - seal-aggregator-testnet.mystenlabs.com
  # Walrus aggregator — fetch IOI ciphertexts referenced in IoisPosted events.
  - aggregator.walrus-testnet.walrus.space
  # Walrus publisher — upload per-side match-proposal blobs after a pair is matched.
  - publisher.walrus-testnet.walrus.space
